version: 2

before:
  hooks:
    - mkdir -p completions
    - go run main.go completion bash > completions/poli.bash
    - go run main.go completion zsh > completions/poli.zsh
    - go run main.go completion fish > completions/poli.fish

builds:
  - main: .
    binary: poli
    ldflags:
      - -s -w -X github.com/jojipanackal/poli/cmd.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - completions/*

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
  groups:
    - title: "✨ Features"
      regexp: '^.*?feat(\(.+\))?\!?:.+$'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\(.+\))?\!?:.+$'
      order: 1
    - title: "📦 Other"
      order: 999

release:
  github:
    owner: jojipanackal
    name: poli
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

homebrew_casks:
  - repository:
      owner: jojipanackal
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: poli
    homepage: "https://github.com/jojipanackal/poli"
    description: "Terminal-based HTTP client — collections, requests, curl import, zero lag."
    license: "MIT"
    binaries:
      - poli
    completions:
      bash: completions/poli.bash
      zsh: completions/poli.zsh
      fish: completions/poli.fish
    url:
      verified: "github.com/jojipanackal/poli"
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/poli"]
    caveats: |
      Get started:
        poli new group \"My APIs\"
        poli new \"Get Users\" --url https://jsonplaceholder.typicode.com/users
        poli ping r1

      Run 'poli help' for all commands.
